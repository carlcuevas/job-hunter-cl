services:
  - type: web
    name: job-hunter-cl
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
